name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: arch
            os: ubuntu-latest
            container: archlinux:base-devel
          - name: appimage
            os: ubuntu-latest
            container: ''
          - name: windows
            os: windows-latest
            container: ''
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    steps:
      - name: Checkout
        if: matrix.name != 'arch'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # ---------------- Arch build (pacman package + .deb) ----------------

      - name: Upgrade Arch Linux
        if: matrix.name == 'arch'
        uses: arch4edu/cactus/actions/upgrade-archlinux@main

      - name: Install Arch build dependencies
        if: matrix.name == 'arch'
        run: |
          pacman -Syu --noconfirm --needed \
            git gnupg zstd cargo cargo-tauri pnpm nodejs npm \
            cairo desktop-file-utils gdk-pixbuf2 xdg-utils glib2 gtk3 \
            hicolor-icon-theme libsoup3 pango cef pacman-contrib

      # using the checkout action in the container is weird
      - name: Checkout
        if: matrix.name == 'arch'
        run: |
          git config --global init.defaultBranch master
          git config --global --add safe.directory $(pwd)
          git init
          git remote add origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git
          git fetch origin ${{ github.ref }}
          git checkout ${{ github.sha }}

      - name: Create unprivileged build user
        if: matrix.name == 'arch'
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Import PKGBUILD signing key
        if: matrix.name == 'arch'
        run: |
          sudo -u builder gpg --fetch-keys https://github.com/yobson1.gpg

      - name: Build Arch package
        if: matrix.name == 'arch'
        run: |
          cd pkg/arch
          version="${GITHUB_REF_NAME#v}"
          sed -i "s/^pkgver=.*/pkgver=${version}/" PKGBUILD
          sudo -u builder updpkgsums
          sudo -u builder makepkg --syncdeps --noconfirm

      - name: Commit updated PKGBUILD
        if: matrix.name == 'arch'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pkg/arch/PKGBUILD
          git commit -m "chore: update PKGBUILD for ${GITHUB_REF_NAME}"
          git push origin HEAD:master

      - name: Upload Arch release asset
        if: matrix.name == 'arch'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: |
            pkg/arch/*.pkg.tar.zst
            !pkg/arch/*-debug-*.pkg.tar.zst
            pkg/arch/src/steam-screenshot-importer/src-tauri/target/release/bundle/deb/*.deb

      # ---------------- Plain Ubuntu build (AppImage) ----------------

      - name: Install Linux build dependencies
        if: matrix.name == 'appimage'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --no-install-suggests \
            libdav1d-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf \
            libnss3

      # ---------------- Rust/Node toolchain (appimage + windows only) ----------------

      - name: Setup Rust
        if: matrix.name != 'arch'
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        if: matrix.name != 'arch'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node
        if: matrix.name != 'arch'
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Setup pnpm
        if: matrix.name != 'arch'
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install frontend dependencies
        if: matrix.name != 'arch'
        run: pnpm install --frozen-lockfile

      - name: Stage system NSS libraries for AppImage bundling
        if: matrix.name == 'appimage'
        run: |
          mkdir -p src-tauri/nss-system
          dpkg -L libnss3 | grep -E '\.so(\.[0-9]+)?$' | xargs -I{} cp -L {} src-tauri/nss-system/
          find /usr/lib -maxdepth 2 -iname '*.chk' -exec cp {} src-tauri/nss-system/ \;

      - name: Build AppImage
        if: matrix.name == 'appimage'
        env:
          NO_STRIP: 'true'
          LD_LIBRARY_PATH: ${{ github.workspace }}/src-tauri/target/release:${{ github.workspace }}/src-tauri/target/release/steam_api:${{ env.LD_LIBRARY_PATH }}
        run: pnpm tauri build --ci --bundles appimage --verbose

      - name: Upload AppImage release asset
        if: matrix.name == 'appimage'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage

      # ---------------- Windows build (.msi) ----------------

      - name: Install Windows build dependencies
        if: matrix.name == 'windows'
        uses: crazy-max/ghaction-chocolatey@v4
        with:
          args: install pkgconfiglite

      - name: Install dav1d
        if: matrix.name == 'windows'
        run: |
          vcpkg install dav1d:x64-windows

      - name: Build Windows installer
        if: matrix.name == 'windows'
        env:
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
        run: |
          pnpm tauri build --ci --bundles msi

      - name: Upload Windows release asset
        if: matrix.name == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          make_latest: true
          draft: false
          files: |
            artifacts/**/*.pkg.tar.zst
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.msi
