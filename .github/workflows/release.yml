name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - name: arch
            os: ubuntu-latest
            container: archlinux:base-devel
          - name: appimage
            os: ubuntu-latest
            container: ghcr.io/pkgforge-dev/archlinux:latest
          - name: windows
            os: windows-latest
            container: ''
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    steps:
      - name: Install Git for checkout
        if: matrix.name == 'arch'
        run: pacman -Syu --noconfirm --needed git

      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # ---------------- Arch build (pacman package + .deb) ----------------

      - name: Upgrade Arch Linux
        if: matrix.name == 'arch'
        uses: arch4edu/cactus/actions/upgrade-archlinux@main

      - name: Prepare Arch Container for AppImage bundler
        if: matrix.name == 'appimage'
        uses: pkgforge-dev/anylinux-setup-action@0964f2258d6c93d1391359978dde081fd8b3c6af # v2

      - name: Install Arch build dependencies
        if: matrix.name != 'windows'
        run: |
          pacman -Syu --noconfirm --needed \
            git gnupg zstd cargo pnpm nodejs npm patchelf \
            cairo desktop-file-utils gdk-pixbuf2 xdg-utils glib2 gtk3 \
            hicolor-icon-theme libsoup3 pango cef pacman-contrib jaq nss

      - name: Install Linux dependencies
        if: matrix.name == 'appimage'
        run: |
          get-debloated-pkgs --add-common --prefer-nano

      - name: Create unprivileged build user
        if: matrix.name == 'arch'
        run: |
          useradd -m builder
          echo 'builder ALL=(ALL) NOPASSWD: ALL' > /etc/sudoers.d/builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Import PKGBUILD signing key
        if: matrix.name == 'arch'
        run: |
          sudo -u builder gpg --fetch-keys https://github.com/yobson1.gpg

      - name: Output stripped version
        if: matrix.name == 'arch'
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create source tarball
        if: matrix.name == 'arch'
        run: |
          git config --global --add safe.directory "$(pwd)"
          git archive --format=tar.gz --prefix=${{ github.event.repository.name }}-src_${{ steps.version.outputs.version }}/ \
            -o ${{ github.event.repository.name }}-src_${{ steps.version.outputs.version }}.tar.gz ${{ github.ref }}

      - name: Import GPG key
        if: matrix.name == 'arch'
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Sign tarball
        if: matrix.name == 'arch'
        run: |
          gpg --batch --yes --local-user A41EB2986F63F6C40FCF2D03ED26A71EB8EB7A34 --detach-sign --armor \
            ${{ github.event.repository.name }}-src_${{ steps.version.outputs.version }}.tar.gz

      - name: Build Arch package
        if: matrix.name == 'arch'
        run: |
          steamworks_rs_ver="$(
            jaq --from toml -r '.package[] | select(.name == "steamworks") | .version' src-tauri/Cargo.lock | head -n1
          )"

          if [ -z "$steamworks_rs_ver" ]; then
            echo "steamworks not found in src-tauri/Cargo.lock"
            exit 1
          fi

          echo "steamworks-rs version: $steamworks_rs_ver"

          cd pkg/arch

          if [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            sed -i "s/^pkgver=.*/pkgver=${{ steps.version.outputs.version }}/" PKGBUILD
            sed -i "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          else
            echo "GITHUB_REF_NAME '${GITHUB_REF_NAME}' does not match vX.Y.Z, leaving pkgver/pkgrel unchanged"
          fi

          sed -i "s/^_steamworks_rs_ver=.*/_steamworks_rs_ver=${steamworks_rs_ver}/" PKGBUILD

          # The release does not exist yet, so resolve its two future assets from
          # the workspace while generating checksums and building the package.
          sed -i 's#${url}/releases/download/v${pkgver}#file://'"${GITHUB_WORKSPACE}"'#' PKGBUILD

          sudo -u builder updpkgsums
          sudo -u builder makepkg --syncdeps --noconfirm

          # Keep the checksums generated from the local files, but publish a
          # PKGBUILD whose sources point at the GitHub release.
          sed -i 's#file://'"${GITHUB_WORKSPACE}"'#${url}/releases/download/v${pkgver}#' PKGBUILD

      - name: Upload PKGBUILD artifact
        if: matrix.name == 'arch'
        uses: actions/upload-artifact@v7
        with:
          name: aur-pkgbuild
          path: pkg/arch/PKGBUILD

      - name: Upload Arch release asset
        if: matrix.name == 'arch'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: |
            pkg/arch/*.pkg.tar.zst
            !pkg/arch/*-debug-*.pkg.tar.zst
            pkg/arch/src/${{ github.event.repository.name }}-src_${{ steps.version.outputs.version }}/src-tauri/target/release/bundle/deb/*.deb
            ${{ github.event.repository.name }}-src_${{ steps.version.outputs.version }}.tar.gz
            ${{ github.event.repository.name }}-src_${{ steps.version.outputs.version }}.tar.gz.asc

      # ---------------- Rust/Node toolchain (appimage + windows only) ----------------

      - name: Setup Rust
        if: matrix.name != 'arch'
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        if: matrix.name != 'arch'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Setup Node
        if: matrix.name == 'windows'
        uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Setup pnpm
        if: matrix.name == 'windows'
        uses: pnpm/action-setup@v6
        with:
          version: 11

      - name: Install frontend dependencies
        if: matrix.name != 'arch'
        run: pnpm install --frozen-lockfile

      - name: Install custom tauri-cli
        if: matrix.name == 'appimage'
        run: cargo install tauri-cli --git https://github.com/yobson1/tauri.git --branch feat/cef_appimage-egl

      - name: Build AppImage
        if: matrix.name == 'appimage'
        env:
          LD_LIBRARY_PATH: ${{ github.workspace }}/src-tauri/target/release:${{ env.LD_LIBRARY_PATH }}
        run: cargo tauri build --ci --bundles appimage --verbose

      - name: Upload AppImage release asset
        if: matrix.name == 'appimage'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/appimage/*.AppImage

      # ---------------- Windows build (.msi) ----------------

      - name: Install Windows build dependencies
        if: matrix.name == 'windows'
        uses: crazy-max/ghaction-chocolatey@v4
        with:
          args: install pkgconfiglite

      - name: Install dav1d
        if: matrix.name == 'windows'
        run: |
          vcpkg install dav1d:x64-windows

      - name: Copy runtime DLLs
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force src-tauri\target\release | Out-Null
          Copy-Item C:\vcpkg\installed\x64-windows\bin\dav1d.dll src-tauri\target\release\
          Copy-Item C:\vcpkg\installed\x64-windows\bin\dav1d.dll src-tauri\

      - name: Build Windows installer
        if: matrix.name == 'windows'
        env:
          PKG_CONFIG_PATH: C:\vcpkg\installed\x64-windows\lib\pkgconfig
        run: |
          pnpm tauri build --ci --bundles msi

      - name: Upload Windows release asset
        if: matrix.name == 'windows'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi

  publish:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download release artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Install typos
        uses: taiki-e/install-action@v2
        with:
          tool: typos

      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        with:
          args: -v --latest
        env:
          OUTPUT: CHANGELOG.md
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Append checksums to release notes
        run: |
          mapfile -d '' files < <(
            find artifacts -type f \
              \( -name '*.pkg.tar.zst' -o -name '*.deb' -o -name '*.AppImage' -o -name '*.msi' -o -name '*.tar.gz' -o -name '*.tar.gz.asc' \) \
              -print0 | sort -z
          )

          {
            echo
            echo "<details>"
            echo "<summary><strong>Checksums</strong></summary> "
            echo

            if (( ${#files[@]} == 0 )); then
              echo "No release assets found."
            else
              for algo in b2 sha512 sha384 sha256 sha224 sha1 md5; do
                cmd="${algo}sum"

                echo "### ${algo}"
                echo

                for file in "${files[@]}"; do
                  filename="$(basename "$file")"
                  hash="$("$cmd" "$file" | awk '{print $1}')"

                  printf -- '- `%s`: `%s`\n' "$filename" "$hash"
                done

                echo
              done
            fi

            echo "</details>"
          } >> CHANGELOG.md

      - name: Copy PKGBUILD to repo
        run: |
          cp artifacts/aur-pkgbuild/PKGBUILD pkg/arch/PKGBUILD

      - name: Commit updated PKGBUILD
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore(pkg): update PKGBUILD for ${{ github.ref_name }}'
          file_pattern: 'pkg/arch/PKGBUILD'
          branch: master

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@da03e160361ce01bf087e790b6ffd196d7dccff7
        with:
          pkgname: ${{ github.event.repository.name }}
          pkgbuild: pkg/arch/PKGBUILD
          commit_username: GitHub Actions
          commit_email: github-actions@github.com
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: '${{ github.ref_name }}'
          updpkgsums: false

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: false
          make_latest: true
          draft: false
          body_path: CHANGELOG.md
          files: |
            artifacts/**/*.pkg.tar.zst
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.msi
            **/*.tar.gz
            **/*.tar.gz.asc
